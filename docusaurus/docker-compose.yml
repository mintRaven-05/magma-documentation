version: '3.8'
name: "docusaurus"

services:
  dev:
    build:
      context: .
      additional_contexts:
        readmes: ../readmes
      target: dev
    container_name: docusaurus_local
    mem_limit: 4g
    ports:
      - "3000:3000"
    volumes:
      - ./../readmes:/opt/docusaurus/docs
    environment:
      - NODE_ENV=development

  serve:
    build:
      context: .
      additional_contexts:
        readmes: ../readmes
      target: serve
    container_name: docusaurus
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  caddy:
    build:
      context: .
      additional_contexts:
        readmes: ../readmes
      target: caddy
    container_name: docusaurus_caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - DOCUSAURUS_DOMAIN=docusaurus.example
      - DOCUSAURUS_EMAIL=letsencrypt@docusaurus.example
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # Regenerate docusaurus/yarn.lock after changing package.json
  #   docker compose run --rm lockgen
  lockgen:
    image: node:26-slim
    working_dir: /tmp
    volumes:
      - .:/out
    command: >
      sh -c "npm install -g yarn@1.22.22 &&
             cp /out/package.json . &&
             yarn install &&
             cp yarn.lock /out/yarn.lock"

volumes:
  caddy_data:
  caddy_config: