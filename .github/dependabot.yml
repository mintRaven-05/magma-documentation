version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /docusaurus
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /readmes
    schedule:
      interval: monthly

  - package-ecosystem: npm
    directory: /docusaurus
    schedule:
      interval: monthly
    groups:
      npm:
        patterns:
          - "*"